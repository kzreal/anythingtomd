<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档转Markdown - anythingtomd</title>
    <style>
        /* Design Tokens - Based on Design Context */
        :root {
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;

            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f7;
            --bg-tertiary: #e9e9e9;

            --accent: #007aff;
            --accent-hover: #0062cc;

            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;

            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;

            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;

            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-md: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 24px;

            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;

            --line-height-normal: 1.5;
        }

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: var(--line-height-normal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--bg-tertiary);
            padding: var(--space-4) var(--space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: var(--radius-sm);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: var(--space-8) var(--space-4);
        }

        .container {
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-lg);
            padding: var(--space-10);
            max-width: 720px;
            width: 100%;
        }

        .title {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-semibold);
            color: var(--text-primary);
            margin-bottom: var(--space-6);
        }

        /* Upload Area */
        .upload-area {
            border: 1px dashed var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: var(--space-8) var(--space-4);
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s ease, background-color 0.15s ease;
            margin-bottom: var(--space-4);
        }

        .upload-area:hover {
            border-color: var(--text-tertiary);
            background: var(--bg-secondary);
        }

        .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(0, 122, 255, 0.04);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto var(--space-3);
            opacity: 0.4;
        }

        .upload-text {
            color: var(--text-primary);
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-medium);
        }

        .upload-hint {
            color: var(--text-tertiary);
            font-size: var(--font-size-sm);
            margin-top: var(--space-2);
        }

        #fileInput {
            display: none;
        }

        /* File Info */
        #fileInfo {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            display: none;
        }

        #fileInfo.show {
            display: block;
        }

        .file-info-row {
            display: flex;
            justify-content: space-between;
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            padding: var(--space-1) 0;
        }

        .file-info-row strong {
            color: var(--text-primary);
        }

        /* Options Panel */
        #levelSelector, #excelInfo {
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            display: none;
        }

        #levelSelector.show, #excelInfo.show {
            display: block;
        }

        .panel-label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--text-secondary);
            margin-bottom: var(--space-3);
        }

        .level-options {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .level-option {
            cursor: pointer;
        }

        .level-option input[type="radio"] {
            display: none;
        }

        .level-option span {
            display: inline-block;
            padding: var(--space-2) var(--space-4);
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-normal);
            transition: all 0.15s ease;
        }

        .level-option input[type="radio"]:checked + span {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .level-option:hover span {
            border-color: var(--text-tertiary);
        }

        /* Buttons */
        .btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: var(--space-3) var(--space-6);
            border-radius: var(--radius-md);
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            transition: background-color 0.15s ease;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        .btn-icon {
            padding: var(--space-2);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
        }

        .btn-group {
            display: flex;
            gap: var(--space-2);
            margin-top: var(--space-4);
        }

        /* Progress */
        #progress {
            margin-top: var(--space-4);
            display: none;
        }

        #progress.show {
            display: block;
        }

        .progress-bar {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            height: 4px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.2s ease;
        }

        .progress-text {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-top: var(--space-2);
            text-align: center;
        }

        /* Result & Preview */
        #result {
            margin-top: var(--space-4);
            display: none;
        }

        #result.show {
            display: block;
        }

        .preview-section {
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .preview-header {
            background: var(--bg-secondary);
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--bg-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-title {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-medium);
            color: var(--text-primary);
        }

        .preview-actions {
            display: flex;
            gap: var(--space-2);
        }

        .preview-text {
            background: var(--bg-primary);
            padding: var(--space-4);
            max-height: 480px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, 'Liberation Mono', monospace;
            font-size: var(--font-size-sm);
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .preview-text::-webkit-scrollbar {
            width: 8px;
        }

        .preview-text::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .preview-text::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
        }

        /* Messages */
        .message {
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            margin-top: var(--space-4);
            display: none;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Footer */
        .footer {
            padding: var(--space-4);
            text-align: center;
            color: var(--text-tertiary);
            font-size: var(--font-size-xs);
        }

        /* Utility */
        .divider {
            border-top: 1px solid var(--bg-tertiary);
            margin: var(--space-4) 0;
        }

        .file-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-2);
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
        }

        .success-icon {
            width: 20px;
            height: 20px;
            color: var(--success);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon"></div>
            anythingtomd
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h1 class="title">文档转 Markdown</h1>

            <div class="upload-area" id="uploadArea">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <div class="upload-text">点击或拖拽上传文件</div>
                <div class="upload-hint">支持 .docx, .xlsx, .xls 格式</div>
            </div>

            <input type="file" id="fileInput" accept=".docx,.xlsx,.xls">

            <div id="fileInfo"></div>

            <div id="levelSelector">
                <div class="panel-label">切分层级（仅 Word 文档）</div>
                <div class="level-options">
                    <label class="level-option">
                        <input type="radio" name="sliceLevel" value="0">
                        <span>零级</span>
                    </label>
                    <label class="level-option">
                        <input type="radio" name="sliceLevel" value="1">
                        <span>一级</span>
                    </label>
                    <label class="level-option">
                        <input type="radio" name="sliceLevel" value="2" checked>
                        <span>二级</span>
                    </label>
                    <label class="level-option">
                        <input type="radio" name="sliceLevel" value="3">
                        <span>三级</span>
                    </label>
                    <label class="level-option">
                        <input type="radio" name="sliceLevel" value="all">
                        <span>全部</span>
                    </label>
                </div>
            </div>

            <div id="excelInfo">
                <div class="panel-label">Excel 转换选项</div>
                <div style="font-size: var(--font-size-sm); color: var(--text-secondary);">
                    每个 sheet 将转换为独立的 Markdown 文件，并包含行编号。
                </div>
            </div>

            <button class="btn" id="convertBtn" disabled>
                开始转换
            </button>

            <div id="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>

            <div id="result"></div>

            <div class="message" id="message"></div>
        </div>
    </main>

    <footer class="footer">
        任意文档转 Markdown 服务
    </footer>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const convertBtn = document.getElementById('convertBtn');
        const levelSelector = document.getElementById('levelSelector');
        const excelInfo = document.getElementById('excelInfo');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const result = document.getElementById('result');
        const message = document.getElementById('message');

        let selectedFile = null;
        let fileType = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            const MAX_SIZE = 1024 * 1024 * 1024;
            if (file.size > MAX_SIZE) {
                showError('文件大小超过 1GB 限制');
                return;
            }

            selectedFile = file;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    fileType = data.file_type;
                    const fileBadge = fileType === 'word' ? 'DOCX' : 'XLSX';
                    const sizeFormatted = (data.file_size / 1024 / 1024).toFixed(2) + ' MB';

                    fileInfo.innerHTML = `
                        <div class="file-info-row">
                            <span><strong>文件名</strong></span>
                            <span>${data.filename}</span>
                        </div>
                        <div class="file-info-row">
                            <span><strong>大小</strong></span>
                            <span>${sizeFormatted}</span>
                        </div>
                        <div class="file-info-row">
                            <span><strong>类型</strong></span>
                            <span><span class="file-badge">${fileBadge}</span></span>
                        </div>
                    `;
                    fileInfo.classList.add('show');

                    if (data.file_type === 'word') {
                        levelSelector.classList.add('show');
                        excelInfo.classList.remove('show');
                    } else {
                        levelSelector.classList.remove('show');
                        excelInfo.classList.add('show');
                    }

                    convertBtn.disabled = false;
                    result.innerHTML = '';
                    result.classList.remove('show');
                    message.style.display = 'none';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('文件分析失败: ' + error.message);
            }
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            progress.classList.add('show');
            result.innerHTML = '';
            result.classList.remove('show');
            convertBtn.disabled = true;
            message.style.display = 'none';

            const options = {};
            if (fileType === 'word') {
                const level = document.querySelector('input[name="sliceLevel"]:checked').value;
                options.max_level = level;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('options', JSON.stringify(options));

            const mode = (fileType === 'word') ? 'download' : 'preview';
            formData.append('mode', mode);

            try {
                updateProgress(50, '转换中...');

                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });

                if (fileType === 'word') {
                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `converted_${selectedFile.name}.zip`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);

                        updateProgress(100, '转换完成');
                        showSuccess('Word 文档转换成功，ZIP 已下载');
                    } else {
                        const data = await response.json();
                        showError(data.error || '下载失败');
                    }
                } else {
                    const data = await response.json();

                    if (data.success) {
                        updateProgress(100, '转换完成');
                        showPreview(data);
                    } else {
                        showError(data.error);
                    }
                }
            } catch (error) {
                showError('转换失败: ' + error.message);
            } finally {
                progress.classList.remove('show');
                convertBtn.disabled = false;
            }
        });

        function showPreview(data) {
            result.innerHTML = `
                <div class="preview-section">
                    <div class="preview-header">
                        <span class="preview-title">转换结果</span>
                        <div class="preview-actions">
                            <button class="btn btn-secondary" onclick="copyContent()">
                                复制
                            </button>
                            <button class="btn" onclick="downloadZip()">
                                下载 ZIP
                            </button>
                        </div>
                    </div>
                    <div class="preview-text" id="previewText">${escapeHtml(data.preview_text)}</div>
                </div>
            `;
            result.classList.add('show');
        }

        function copyContent() {
            const previewText = document.getElementById('previewText');
            const text = previewText.textContent;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showSuccess('已复制到剪贴板');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();

            try {
                document.execCommand('copy');
                showSuccess('已复制到剪贴板');
            } catch (err) {
                showError('复制失败，请手动复制');
            }

            document.body.removeChild(textarea);
        }

        async function downloadZip() {
            if (!selectedFile) return;

            const options = {};
            if (fileType === 'word') {
                const level = document.querySelector('input[name="sliceLevel"]:checked').value;
                options.max_level = level;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('options', JSON.stringify(options));

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `converted_${selectedFile.name}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showSuccess('下载成功');
                } else {
                    const data = await response.json();
                    showError(data.error || '下载失败');
                }
            } catch (error) {
                showError('下载失败: ' + error.message);
            }
        }

        function showError(text) {
            message.textContent = text;
            message.className = 'message error';
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 5000);
        }

        function showSuccess(text) {
            message.textContent = text;
            message.className = 'message success';
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        function updateProgress(value, text) {
            progressFill.style.width = value + '%';
            progressText.textContent = text;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
