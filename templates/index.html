<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlltoMarkdown</title>
    <style>
        /* Vercel Design System */
        :root {
            /* Vercel Color Palette - 黑白高对比 */
            --vc-black: #000000;
            --vc-white: #ffffff;
            --vc-gray-50: #fafafa;
            --vc-gray-100: #f4f4f5;
            --vc-gray-200: #e5e7eb;
            --vc-gray-300: #d4d4d8;
            --vc-gray-400: #9ca3af;
            --vc-gray-500: #6b7280;
            --vc-gray-600: #525252;
            --vc-gray-700: #404040;
            --vc-gray-800: #262626;
            --vc-gray-900: #171717;

            --vc-gray-950: #0b0a0a;

            /* Accent - 保持蓝色 */
            --vc-accent: #0070f3;
            --vc-accent-hover: #0060db;
            --vc-accent-light: #e8eef6;
            --vc-accent-subtle: #f1f5f9;

            /* Success/Error */
            --vc-success: #22c55e;
            --vc-success-bg: #dcfce7;
            --vc-error: #ef4444;
            --vc-error-bg: #fee2e2;

            /* Spacing */
            --vc-space-1: 2px;
            --vc-space-2: 4px;
            --vc-space-3: 6px;
            --vc-space-4: 8px;
            --vc-space-5: 10px;
            --vc-space-6: 14px;
            --vc-space-8: 18px;
            --vc-space-10: 20px;
            --vc-space-12: 24px;
            --vc-space-16: 32px;

            /* Border Radius - Vercel 风格圆润 */
            --vc-radius-sm: 6px;
            --vc-radius-md: 10px;
            --vc-radius-lg: 14px;
            --vc-radius-xl: 18px;
            --vc-radius-2xl: 24px;
            --vc-radius-full: 9999px;

            /* Typography - 现代 Sans */
            --vc-font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --vc-font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', Consolas, monospace;

            --vc-font-size-xs: 11px;
            --vc-font-size-sm: 12px;
            --vc-font-size-md: 14px;
            --vc-font-size-lg: 16px;
            --vc-font-size-xl: 18px;
            --vc-font-size-2xl: 24px;

            --vc-font-weight-normal: 400;
            --vc-font-weight-medium: 500;
            --vc-font-weight-semibold: 600;

            --vc-line-height-tight: 1.3;
            --vc-line-height-normal: 1.5;
            --vc-line-height-relaxed: 1.7;

            /* Shadow - Vercel 细腻阴影 */
            --vc-shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
            --vc-shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.08);
            --vc-shadow-md: 0 2px 8px rgba(0, 0, 0, 0.12);
            --vc-shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.16);
            --vc-shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.2);

            /* Transitions - 快速流畅 */
            --vc-transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
            --vc-transition-base: 180ms cubic-bezier(0.4, 0, 0.2, 1);
            --vc-transition-slow: 240ms cubic-bezier(0.4, 0, 0.2, 1);

            /* Border - 微细边框 */
            --vc-border: 1px solid var(--vc-gray-200);
            --vc-border-subtle: 1px solid var(--vc-gray-100);
        }

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--vc-font-sans);
            background: var(--vc-white);
            color: var(--vc-gray-900);
            line-height: var(--vc-line-height-normal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header {
            background: var(--vc-white);
            border-bottom: var(--vc-border);
            padding: var(--vc-space-5) var(--vc-space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--vc-space-2);
        }

        .logo-text {
            font-size: var(--vc-font-size-xl);
            font-weight: var(--vc-font-weight-semibold);
            color: var(--vc-black);
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--vc-black);
            border-radius: var(--vc-radius-md);
            color: var(--vc-white);
            font-size: 14px;
            font-weight: var(--vc-font-weight-semibold);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: var(--vc-space-8);
            padding: var(--vc-space-8) var(--vc-space-8);
            align-items: start;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 65px);
        }

        /* Left Panel */
        .left-panel {
            background: var(--vc-white);
            display: flex;
            flex-direction: column;
            gap: var(--vc-space-6);
        }

        .left-panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--vc-space-6);
        }

        .left-panel-footer {
            padding-top: var(--vc-space-5);
        }

        /* Title */
        .title {
            font-size: var(--vc-font-size-xl);
            font-weight: var(--vc-font-weight-normal);
            color: var(--vc-gray-500);
            margin-bottom: var(--vc-space-6);
            letter-spacing: 0.01em;
            position: relative;
            padding-left: var(--vc-space-5);
            opacity: 0.85;
        }

        .title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: linear-gradient(to bottom, var(--vc-gray-300), var(--vc-gray-400));
            border-radius: 1px;
        }

        /* Upload Area - Vercel 风格 */
        .upload-area {
            border: var(--vc-border-subtle);
            border-radius: var(--vc-radius-lg);
            padding: var(--vc-space-10) var(--vc-space-8);
            text-align: center;
            cursor: pointer;
            transition: all var(--vc-transition-base);
            background: var(--vc-white);
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--vc-gray-400);
            background: var(--vc-gray-50);
            transform: translateY(-1px);
        }

        .upload-area.dragover {
            border-color: var(--vc-accent);
            background: var(--vc-accent-light);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto var(--vc-space-4);
            color: var(--vc-gray-500);
            transition: color var(--vc-transition-fast);
        }

        .upload-area:hover .upload-icon {
            color: var(--vc-accent);
        }

        .upload-text {
            color: var(--vc-gray-900);
            font-size: var(--vc-font-size-md);
            font-weight: var(--vc-font-weight-medium);
            margin-bottom: var(--vc-space-1);
        }

        .upload-hint {
            color: var(--vc-gray-500);
            font-size: var(--vc-font-size-sm);
        }

        #fileInput {
            display: none;
        }

        /* File Info Card */
        #fileInfo {
            background: var(--vc-white);
            border: var(--vc-border);
            border-radius: var(--vc-radius-md);
            box-shadow: var(--vc-shadow-sm);
            padding: var(--vc-space-5);
            margin-bottom: var(--vc-space-6);
            display: none;
        }

        #fileInfo.show {
            display: block;
            animation: slideIn 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-info-row {
            display: flex;
            justify-content: space-between;
            font-size: var(--vc-font-size-sm);
            color: var(--vc-gray-600);
            padding: var(--vc-space-2) 0;
        }

        .file-info-row strong {
            color: var(--vc-gray-900);
            font-weight: var(--vc-font-weight-medium);
        }

        /* Options Panel */
        #levelSelector, #excelInfo, #pdfInfo, #imageInfo {
            background: var(--vc-white);
            border: var(--vc-border);
            border-radius: var(--vc-radius-md);
            padding: var(--vc-space-5);
            margin-bottom: var(--vc-space-6);
            display: none;
        }

        #levelSelector.show, #excelInfo.show, #pdfInfo.show, #imageInfo.show {
            display: block;
            animation: slideIn 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel-label {
            font-size: var(--vc-font-size-xs);
            font-weight: var(--vc-font-weight-semibold);
            color: var(--vc-gray-500);
            margin-bottom: var(--vc-space-3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .level-options {
            display: flex;
            gap: var(--vc-space-1);
            flex-wrap: wrap;
        }

        .level-option {
            cursor: pointer;
            position: relative;
        }

        .level-option input[type="radio"] {
            display: none;
        }

        .level-option span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--vc-space-2) var(--vc-space-4);
            background: var(--vc-gray-50);
            border-radius: var(--vc-radius-md);
            border: var(--vc-border-subtle);
            color: var(--vc-gray-700);
            font-size: var(--vc-font-size-sm);
            font-weight: var(--vc-font-weight-normal);
            transition: all var(--vc-transition-fast);
        }

        .level-option span:hover {
            background: var(--vc-white);
            border-color: var(--vc-accent);
            color: var(--vc-accent);
            box-shadow: var(--vc-shadow-sm);
        }

        .level-option input[type="radio"]:checked + span {
            background: var(--vc-accent);
            border-color: var(--vc-accent);
            color: var(--vc-white);
            font-weight: var(--vc-font-weight-medium);
        }

        /* Button - Vercel 风格 */
        .btn {
            background: var(--vc-black);
            color: var(--vc-white);
            border: none;
            padding: var(--vc-space-3) var(--vc-space-10);
            border-radius: var(--vc-radius-md);
            font-size: var(--vc-font-size-md);
            font-weight: var(--vc-font-weight-medium);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all var(--vc-transition-base);
            box-shadow: var(--vc-shadow-md);
            text-transform: uppercase;
            letter-spacing: 0.01em;
            width: 100%;
            max-width: 400px;
        }

        .btn:hover:not(:disabled) {
            background: var(--vc-gray-800);
            box-shadow: var(--vc-shadow-lg);
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: var(--vc-shadow-sm);
        }

        .btn:disabled {
            background: var(--vc-gray-200);
            color: var(--vc-gray-400);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-secondary {
            background: var(--vc-white);
            color: var(--vc-gray-900);
            border: var(--vc-border);
            padding: var(--vc-space-2) var(--vc-space-5);
            font-size: var(--vc-font-size-sm);
            border-radius: var(--vc-radius-md);
            box-shadow: var(--vc-shadow-xs);
        }

        .btn-secondary:hover {
            background: var(--vc-gray-50);
            border-color: var(--vc-gray-300);
        }

        .btn-group {
            display: flex;
            gap: var(--vc-space-2);
        }

        /* Progress */
        #progress {
            display: none;
            margin-top: var(--vc-space-4);
        }

        #progress.show {
            display: block;
        }

        .progress-container {
            background: var(--vc-gray-50);
            border-radius: var(--vc-radius-md);
            padding: var(--vc-space-4);
            box-shadow: var(--vc-shadow-sm);
        }

        .progress-bar {
            background: var(--vc-gray-200);
            border-radius: var(--vc-radius-full);
            height: 4px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--vc-accent);
            height: 100%;
            width: 0%;
            transition: width var(--vc-transition-base);
            box-shadow: 0 0 8px rgba(0, 112, 243, 0.3);
        }

        .progress-text {
            font-size: var(--vc-font-size-sm);
            color: var(--vc-gray-600);
            margin-top: var(--vc-space-3);
            text-align: center;
        }

        /* Right Panel */
        .right-panel {
            background: var(--vc-white);
            border: var(--vc-border);
            border-radius: var(--vc-radius-lg);
            display: grid;
            grid-template-columns: 280px 1fr;
            overflow: hidden;
            box-shadow: var(--vc-shadow-sm);
            height: 100%;
        }

        /* Section List */
        .section-list {
            background: var(--vc-gray-50);
            border-right: var(--vc-border);
            overflow-y: auto;
            height: 100%;
        }

        .section-item {
            padding: var(--vc-space-4) var(--vc-space-5);
            cursor: pointer;
            border-bottom: var(--vc-border);
            font-size: var(--vc-font-size-sm);
            color: var(--vc-gray-700);
            transition: all var(--vc-transition-fast);
            position: relative;
        }

        .section-item:hover {
            background: var(--vc-white);
            color: var(--vc-black);
            padding-left: calc(var(--vc-space-4) + 2px);
        }

        .section-item.active {
            background: var(--vc-accent-light);
            color: var(--vc-accent);
            border-left: 2px solid var(--vc-accent);
            padding-left: calc(var(--vc-space-4) + 2px);
            font-weight: var(--vc-font-weight-medium);
        }

        /* Preview Panel */
        .preview-panel {
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-header {
            background: var(--vc-white);
            padding: var(--vc-space-4) var(--vc-space-6);
            border-bottom: var(--vc-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-title {
            font-size: var(--vc-font-size-md);
            font-weight: var(--vc-font-weight-medium);
            color: var(--vc-gray-900);
        }

        .preview-actions {
            display: flex;
            gap: var(--vc-space-2);
        }

        .preview-text {
            background: var(--vc-white);
            padding: var(--vc-space-6);
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: var(--vc-font-mono);
            font-size: var(--vc-font-size-sm);
            line-height: var(--vc-line-height-relaxed);
            color: var(--vc-gray-700);
        }

        /* Scrollbar - Vercel 风格 */
        .preview-text::-webkit-scrollbar,
        .section-list::-webkit-scrollbar,
        .left-panel-content::-webkit-scrollbar {
            width: 8px;
        }

        .preview-text::-webkit-scrollbar-track,
        .section-list::-webkit-scrollbar-track,
        .left-panel-content::-webkit-scrollbar-track {
            background: var(--vc-gray-50);
        }

        .preview-text::-webkit-scrollbar-thumb,
        .section-list::-webkit-scrollbar-thumb,
        .left-panel-content::-webkit-scrollbar-thumb {
            background: var(--vc-gray-200);
            border-radius: var(--vc-radius-sm);
            border: 2px solid transparent;
        }

        .preview-text::-webkit-scrollbar-thumb:hover,
        .section-list::-webkit-scrollbar-thumb:hover,
        .left-panel-content::-webkit-scrollbar-thumb:hover {
            background: var(--vc-gray-300);
        }

        /* Messages */
        .message {
            padding: var(--vc-space-4) var(--vc-space-6);
            border-radius: var(--vc-radius-md);
            font-size: var(--vc-font-size-sm);
            display: none;
            box-shadow: var(--vc-shadow-md);
            animation: slideIn 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .message.show {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--vc-space-2);
        }

        .message.success {
            background: var(--vc-success-bg);
            color: var(--vc-success);
            border: 1px solid var(--vc-success);
        }

        .message.error {
            background: var(--vc-error-bg);
            color: var(--vc-error);
            border: 1px solid var(--vc-error);
        }

        /* Footer */
        .footer {
            padding: var(--vc-space-5);
            text-align: center;
            color: var(--vc-gray-400);
            font-size: var(--vc-font-size-xs);
            border-top: var(--vc-border);
        }

        /* File Badge */
        .file-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--vc-space-1);
            padding: var(--vc-space-1) var(--vc-space-2);
            background: var(--vc-accent-subtle);
            border-radius: var(--vc-radius-sm);
            font-size: var(--vc-font-size-xs);
            font-weight: var(--vc-font-weight-semibold);
            color: var(--vc-accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main {
                grid-template-columns: 1fr;
                height: auto;
                padding: var(--vc-space-6);
            }

            .right-panel {
                border-radius: 0;
                box-shadow: none;
            }

            .left-panel {
                border-bottom: var(--vc-border);
            }

            .left-panel-footer {
                padding-top: var(--vc-space-4);
            }
        }

        @media (max-width: 768px) {
            .main {
                padding: var(--vc-space-4);
            }

            .right-panel {
                grid-template-columns: 220px 1fr;
            }

            .upload-area {
                padding: var(--vc-space-8);
            }
        }

        @media (max-width: 640px) {
            .main {
                padding: var(--vc-space-3);
            }

            .right-panel {
                grid-template-columns: 180px 1fr;
            }

            .title {
                font-size: var(--vc-font-size-xl);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">AlltoMarkdown</span>
        </div>
    </header>

    <main class="main">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="left-panel-content">
                <h1 class="title">将文件处理为模型易读的markdown</h1>

                <div class="upload-area" id="uploadArea">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2 2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <div class="upload-text">点击或拖拽上传文件</div>
                    <div class="upload-hint">支持 .docx, .xlsx, .xls, .pdf, .png, .jpg, .jpeg</div>
                </div>

                <input type="file" id="fileInput" accept=".docx,.xlsx,.xls,.pdf,.png,.jpg,.jpeg">

                <div id="fileInfo"></div>

                <div id="levelSelector">
                    <div class="panel-label">切分层级（仅 Word 文档）</div>
                    <div class="level-options">
                        <label class="level-option">
                            <input type="radio" name="sliceLevel" value="0">
                            <span>零级</span>
                        </label>
                        <label class="level-option">
                            <input type="radio" name="sliceLevel" value="1">
                            <span>一级</span>
                        </label>
                        <label class="level-option">
                            <input type="radio" name="sliceLevel" value="2" checked>
                            <span>二级</span>
                        </label>
                        <label class="level-option">
                            <input type="radio" name="sliceLevel" value="3">
                            <span>三级</span>
                        </label>
                        <label class="level-option">
                            <input type="radio" name="sliceLevel" value="all">
                            <span>全部</span>
                        </label>
                    </div>
                </div>

                <div id="excelInfo" style="display: none;"></div>
                <div id="pdfInfo" style="display: none;"></div>
                <div id="imageInfo" style="display: none;"></div>
            </div>

            <div class="left-panel-footer">
                <button class="btn" id="convertBtn" disabled>
                    开始转换
                </button>

                <div id="progress">
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>

                <div id="result"></div>

                <div class="message" id="message"></div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel" id="rightPanel" style="display: none;">
            <!-- 切片/Sheet 列表 -->
            <div class="section-list" id="sectionList"></div>

            <!-- 预览内容 -->
            <div class="preview-panel">
                <div class="preview-section">
                    <div class="preview-header">
                        <span class="preview-title" id="previewTitle">预览</span>
                        <div class="preview-actions">
                            <button class="btn btn-secondary" onclick="copyContent()">复制</button>
                            <button class="btn" onclick="downloadZip()">下载 ZIP</button>
                        </div>
                    </div>
                    <div class="preview-text" id="previewText"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        AlltoMarkdown - 任意文档转 Markdown
    </footer>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const convertBtn = document.getElementById('convertBtn');
        const levelSelector = document.getElementById('levelSelector');
        const excelInfo = document.getElementById('excelInfo');
        const pdfInfo = document.getElementById('pdfInfo');
        const imageInfo = document.getElementById('imageInfo');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const result = document.getElementById('result');
        const message = document.getElementById('message');

        let selectedFile = null;
        let fileType = null;
        let sessionId = null;
        let cachedSections = [];
        let currentSectionIndex = 0;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        async function handleFiles(files) {
            const fileList = Array.from(files);
            const file = fileList[0];
            await handleSingleFile(file);
        }

        async function handleSingleFile(file) {
            const MAX_SIZE = 1024 * 1024 * 1024;
            if (file.size > MAX_SIZE) {
                showError('文件大小超过 1GB 限制');
                return;
            }

            selectedFile = file;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    fileType = data.file_type;
                    let fileBadge;
                    if (fileType === 'word') fileBadge = 'DOCX';
                    else if (fileType === 'excel') fileBadge = 'XLSX';
                    else if (fileType === 'pdf') fileBadge = 'PDF';
                    else if (fileType === 'image') fileBadge = 'IMAGE';
                    else fileBadge = 'UNKNOWN';

                    const sizeFormatted = (data.file_size / 1024 / 1024).toFixed(2) + ' MB';

                    fileInfo.innerHTML = `
                        <div class="file-info-row">
                            <span><strong>文件名</strong></span>
                            <span>${data.filename}</span>
                        </div>
                        <div class="file-info-row">
                            <span><strong>大小</strong></span>
                            <span>${sizeFormatted}</span>
                        </div>
                        <div class="file-info-row">
                            <span><strong>类型</strong></span>
                            <span><span class="file-badge">${fileBadge}</span></span>
                        </div>
                    `;
                    fileInfo.classList.add('show');

                    levelSelector.classList.remove('show');
                    excelInfo.classList.remove('show');
                    pdfInfo.classList.remove('show');
                    imageInfo.classList.remove('show');

                    if (data.file_type === 'word') {
                        levelSelector.classList.add('show');
                    } else if (data.file_type === 'excel') {
                        excelInfo.classList.add('show');
                    } else if (data.file_type === 'pdf') {
                        pdfInfo.classList.add('show');
                    } else if (data.file_type === 'image') {
                        imageInfo.classList.add('show');
                    }

                    convertBtn.disabled = false;
                    result.innerHTML = '';
                    result.classList.remove('show');
                    rightPanel.style.display = 'grid';
                    message.style.display = 'none';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('文件分析失败: ' + error.message);
            }
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            progress.classList.add('show');
            result.innerHTML = '';
            result.classList.remove('show');
            rightPanel.style.display = 'none';
            convertBtn.disabled = true;
            message.style.display = 'none';

            const options = {};
            if (fileType === 'word') {
                const level = document.querySelector('input[name="sliceLevel"]:checked').value;
                options.max_level = level;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('options', JSON.stringify(options));

            formData.append('mode', 'preview');

            try {
                updateProgress(10, '正在上传文件...');

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30 * 60 * 1000);

                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });

                updateProgress(50, '正在解析...');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                clearTimeout(timeoutId);

                if (data.success) {
                    updateProgress(90, '正在生成预览...');
                    await new Promise(resolve => setTimeout(resolve, 200));
                    updateProgress(100, '转换完成');
                    handleConvertResponse(data);
                } else {
                    showError(data.error || '转换失败');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showError('请求超时，请尝试上传较小的文件或等待更长时间');
                } else {
                    showError('转换失败: ' + error.message);
                }
            } finally {
                progress.classList.remove('show');
                convertBtn.disabled = false;
            }
        });

        async function handleConvertResponse(data) {
            sessionId = data.session_id;
            cachedSections = data.sections;
            currentSectionIndex = 0;

            rightPanel.style.display = 'grid';

            renderSectionList(cachedSections);

            if (cachedSections[0]) {
                showSectionPreview(0);
            }
        }

        function renderSectionList(sections) {
            sectionList.innerHTML = sections.map((section, index) => `
                <div class="section-item ${index === currentSectionIndex ? 'active' : ''}"
                     onclick="switchSection(${index})">
                    ${section.title || '无标题'}
                </div>
            `).join('');
        }

        async function switchSection(index) {
            if (index === currentSectionIndex) return;
            currentSectionIndex = index;

            renderSectionList(cachedSections);

            if (cachedSections[index].content) {
                showPreviewContent(cachedSections[index].content);
            } else {
                await fetchSectionContent(sessionId, index);
            }
        }

        async function fetchSectionContent(sessionId, index) {
            try {
                const response = await fetch(`/api/section/${sessionId}/${index}`);
                const data = await response.json();

                if (data.success) {
                    cachedSections[index].content = data.content;
                    showPreviewContent(data.content);
                } else {
                    showError(data.error || '获取内容失败');
                }
            } catch (error) {
                showError('获取内容失败: ' + error.message);
            }
        }

        function showSectionPreview(index) {
            if (cachedSections[index]) {
                previewTitle.textContent = cachedSections[index].title || '预览';
                showPreviewContent(cachedSections[index].content || '');
            }
        }

        function showPreviewContent(content) {
            previewText.textContent = content;
        }

        function showPreview(data) {
            // 保留空函数以兼容旧的调用方式
        }

        function copyContent() {
            const text = previewText.textContent;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showSuccess('已复制到剪贴板');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();

            try {
                document.execCommand('copy');
                showSuccess('已复制到剪贴板');
            } catch (err) {
                showError('复制失败，请手动复制');
            }

            document.body.removeChild(textarea);
        }

        async function downloadZip() {
            if (!selectedFile) return;

            const options = {};
            if (fileType === 'word') {
                const level = document.querySelector('input[name="sliceLevel"]:checked').value;
                options.max_level = level;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('options', JSON.stringify(options));

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `converted_${selectedFile.name}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showSuccess('下载成功');
                } else {
                    const data = await response.json();
                    showError(data.error || '下载失败');
                }
            } catch (error) {
                showError('下载失败: ' + error.message);
            }
        }

        function showError(text) {
            message.innerHTML = `<span>${text}</span>`;
            message.className = 'message error show';
            setTimeout(() => {
                message.classList.remove('show');
            }, 4000);
        }

        function showSuccess(text) {
            message.innerHTML = `<span>${text}</span>`;
            message.className = 'message success show';
            setTimeout(() => {
                message.classList.remove('show');
            }, 2500);
        }

        function updateProgress(value, text) {
            progressFill.style.width = value + '%';
            progressText.textContent = text;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
